name: Desktop and Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install server dependencies
        run: npm --prefix server ci --legacy-peer-deps

      - name: Build portable app
        run: npm run desktop:build:portable

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsmeNails-windows-portable
          path: release/*.exe

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true

  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Build web and sync Capacitor Android
        run: npm run android:sync

      - name: Build Android debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: EsmeNails-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish Android APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
